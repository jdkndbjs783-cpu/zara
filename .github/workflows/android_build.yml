name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Decompress Project Files
      run: |
        unzip -q -o zara.zip -d .
        echo "Files unzipped successfully."
        ls -la

    - name: Build with Gradle
      run: |
        yes | sdkmanager --licenses || true
        if [ ! -f gradlew ]; then
          gradle wrapper --gradle-version 8.2
        fi
        chmod +x gradlew
        # যেকোনো ছোটখাটো ওয়ার্নিং বা লিন্ট এরর ইগনোর করে অ্যাপ তৈরি করার স্পেশাল কমান্ড
        ./gradlew assembleDebug -x lint -x test --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zara-AI-Assistant-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
