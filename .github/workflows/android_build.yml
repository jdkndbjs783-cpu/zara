name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Decompress Project Files
      run: |
        if [ -f zara.zip ]; then
          unzip -q zara.zip -d extracted_project
          echo "Files unzipped successfully."
          cd extracted_project && ls -la
        else
          echo "zara.zip not found"
          exit 1
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Find and Build Android Project
      run: |
        # প্রোজেক্টের মূল ফোল্ডার যেখানে gradlew আছে তা খুঁজে বের করা
        GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
        
        if [ -z "$GRADLE_PATH" ]; then
          echo "Error: gradlew file not found anywhere in the zip!"
          exit 1
        fi
        
        PROJECT_ROOT=$(dirname "$GRADLE_PATH")
        echo "Found Android project root at: $PROJECT_ROOT"
        
        cd "$PROJECT_ROOT"
        chmod +x gradlew
        
        echo "Starting APK Build..."
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zara-AI-Assistant-APK
        path: "**/build/outputs/apk/debug/*.apk"
