name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Decompress Project Files
      run: |
        if [ -f zara.zip ]; then
          unzip -q zara.zip -d .
          echo "Files unzipped successfully."
          ls -la
        else
          echo "zara.zip not found"
          exit 1
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle and Build APK
      run: |
        # যদি gradlew ফাইল না থাকে, তবে গিটহাব নিজে থেকে একটি সচল ফাইল তৈরি করে নেবে
        if [ ! -f gradlew ]; then
          echo "gradlew not found, generating a new wrapper..."
          gradle wrapper --gradle-version 8.2
        fi
        
        chmod +x gradlew
        echo "Starting Final APK Build..."
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zara-AI-Assistant-APK
        path: "**/build/outputs/apk/debug/*.apk"
