name: Android APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin'

    - name: Setup Fresh Gradle Engine
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'

    - name: Extract and Fix Corrupt Wrapper File
      run: |
        unzip -o zara.zip
        # ড্যামেজ জার ফাইলটিকে লাথি মেরে ডিলিট করা হচ্ছে
        rm -f gradle/wrapper/gradle-wrapper.jar
        # গিটহাব নিজে থেকে একদম নতুন ফ্রেশ জার ফাইল জেনারেট করে নিচ্ছে
        gradle wrapper --gradle-version 9.3.1
        chmod +x gradlew

    - name: Build with Fixed Gradle
      run: ./gradlew assembleRelease --no-daemon
      env:
        JAVA_HOME: ${{ env.JAVA_HOME }}

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: "**/build/outputs/apk/release/*.apk"
