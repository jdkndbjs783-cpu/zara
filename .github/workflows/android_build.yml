name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Decompress Project Files
      run: |
        if [ -f zara.zip ]; then
          unzip -q zara.zip -d .
          echo "Files unzipped successfully."
          ls -la
        else
          echo "zara.zip not found"
          exit 1
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradle
      run: |
        chmod +x gradlew || true
        chmod +x ./gradlew || true

    - name: Build Android APK
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug --stacktrace
        else
          echo "gradlew not found in root, searching..."
          find . -name gradlew -exec chmod +x {} \;
          find . -name gradlew -exec {} assembleDebug \;
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zara-AI-Assistant-APK
        path: "**/build/outputs/apk/**/*.apk"
        
