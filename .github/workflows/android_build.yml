name: Android APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Unzip and Organize Files
      run: |
        unzip -o zara.zip
        # যদি ফাইলগুলো কোনো সাব-ফোল্ডারে আনজিপ হয়ে থাকে, তবে সেগুলোকে মেইন ডিরেক্টরিতে নিয়ে আসবে
        if [ -d "zara" ]; then
          mv zara/* .
          rm -rf zara
        fi
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: "**/build/outputs/apk/release/*.apk"
